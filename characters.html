    <div class="about-layout">

      <div class="about-pane">
        <section class="catalog-section" style="margin-top:0">
          <div class="catalog-head">
            <h2>Characters</h2>
            <div class="catalog-head-actions">
              <input type="search" id="char-search" class="catalog-searchbox"
                     placeholder="Filter…" aria-label="filter characters" />
            </div>
          </div>
          <div id="char-list">
            <div class="catalog-loading">Character index not yet available.</div>
          </div>
        </section>
      </div>

      <div class="catalog-preview" id="char-detail-panel">
        <div class="preview-head">
          <span id="preview-title">Select a character</span>
        </div>
        <div id="char-detail-content" class="hp-pane"></div>
      </div>

    </div>

    <footer class="foot">
      Source:
      <a href="https://github.com/pleuston/epiwen"
         target="_blank" rel="noopener">github.com/pleuston/epiwen</a>

    <div id="toast" role="status" aria-live="polite"></div>
    <script src="collections.js"></script>
