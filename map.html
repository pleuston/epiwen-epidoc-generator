<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Epiwen · Map</title>
    <link rel="stylesheet" href="styles.css" />
    <!-- Leaflet (vendored locally — no CDN, no build step) -->
    <link rel="stylesheet" href="leaflet/leaflet.css" />
    <link rel="stylesheet" href="leaflet/MarkerCluster.css" />
    <link rel="stylesheet" href="leaflet/MarkerCluster.Default.css" />
    <script src="auth.js"></script>
    <style>
      #map { width: 100%; background: #aadaff; }
      /* custom teardrop-free circular markers via divIcon */
      .site-divicon { background: transparent; border: none; }
      .map-marker {
        width: 13px; height: 13px; border-radius: 50%;
        background: var(--accent, #c0392b); border: 2px solid #fff;
        box-shadow: 0 1px 3px rgba(0,0,0,.45); box-sizing: border-box;
      }
      .map-marker.is-parent { background: var(--accent-strong, #7a1f12); width: 15px; height: 15px; }
      .leaflet-popup-content h4 { margin: 0 0 .15rem; font-size: .95rem; }
      .leaflet-popup-content .pp-sub { color: var(--text-muted, #888); font-size: .82em; }
      .leaflet-popup-content a { display: inline-block; margin-top: .45rem; }
      .map-legend {
        position: absolute; bottom: 8px; left: 10px; z-index: 600;
        background: rgba(255,255,255,.88); border: 1px solid var(--border, #ccc);
        border-radius: 5px; padding: .35rem .55rem; font-size: .78rem; color: var(--text, #333);
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="brand"><a href="catalog.html" class="brand-home">Epiwen</a></div>
      <nav class="sitenav">
        <a href="map.html"                      class="sitenav-link active">Map</a>
        <a href="sites.html"                    class="sitenav-link">Sites</a>
        <a href="catalog.html"                  class="sitenav-link">Objects</a>
        <a href="catalog.html?tab=inscriptions"  class="sitenav-link">Inscriptions</a>
        <a href="catalog.html?tab=rubbings"     class="sitenav-link">Rubbings</a>
        <a href="authorities.html"              class="sitenav-link">Authorities</a>
        <a href="bibliography.html"             class="sitenav-link">Bibliography</a>
        <a href="docs.html"                     class="sitenav-link">Docs</a>
      </nav>
      <button onclick="EpiAuth.signOut()" class="btn small">Sign out</button>
    </header>

    <div style="position:relative">
      <div id="map"></div>
      <div class="map-legend"><span id="map-count"></span> sites · click a marker to open it</div>
    </div>

    <div id="toast" role="status" aria-live="polite"></div>
    <script src="leaflet/leaflet.js"></script>
    <script src="leaflet/leaflet.markercluster.js"></script>
    <script src="map.js"></script>
  </body>
</html>
