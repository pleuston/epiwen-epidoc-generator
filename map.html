<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Epiwen · Map</title>
    <link rel="stylesheet" href="styles.css" />
    <!-- Leaflet (vendored locally — no CDN, no build step) -->
    <link rel="stylesheet" href="leaflet/leaflet.css" />
    <link rel="stylesheet" href="leaflet/MarkerCluster.css" />
    <link rel="stylesheet" href="leaflet/MarkerCluster.Default.css" />
    <script src="auth.js"></script>
    <script src="collections.js"></script>
    <script src="data.js"></script>
    <style>
      #map { width: 100%; background: #aadaff; }
      /* custom teardrop-free circular markers via divIcon */
      .site-divicon { background: transparent; border: none; }
      .map-marker {
        width: 13px; height: 13px; border-radius: 50%;
        background: var(--accent, #c0392b); border: 2px solid #fff;
        box-shadow: 0 1px 3px rgba(0,0,0,.45); box-sizing: border-box;
      }
      .map-marker.is-parent { background: var(--accent-strong, #7a1f12); width: 15px; height: 15px; }
      .leaflet-popup-content h4 { margin: 0 0 .15rem; font-size: .95rem; }
      .leaflet-popup-content .pp-sub { color: var(--text-muted, #888); font-size: .82em; }
      .leaflet-popup-content a { display: inline-block; margin-top: .45rem; }
      .map-legend {
        position: absolute; bottom: 8px; left: 10px; z-index: 600;
        background: rgba(255,255,255,.88); border: 1px solid var(--border, #ccc);
        border-radius: 5px; padding: .35rem .55rem; font-size: .78rem; color: var(--text, #333);
      }

      /* ── Custom grouped layer panel ── */
      .lp { position: relative; }
      .lp-btn {
        width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
        background: #fff; color: var(--text, #333); border: 0; border-radius: 7px; cursor: pointer;
        box-shadow: 0 1px 5px rgba(0,0,0,.3);
      }
      .lp-btn:hover { background: var(--bg-subtle, #f2f5fb); }
      .lp.open .lp-btn { display: none; }
      .lp-body {
        display: none; width: 232px; max-height: 76vh; overflow-y: auto;
        background: var(--bg, #fff); border-radius: 9px;
        box-shadow: 0 6px 26px rgba(0,0,0,.22); padding-bottom: .35rem;
        font-size: .84rem; line-height: 1.3; -webkit-overflow-scrolling: touch;
      }
      .lp.open .lp-body { display: block; }
      .lp-head {
        position: sticky; top: 0; z-index: 1; display: flex; align-items: center;
        justify-content: space-between; padding: .5rem .7rem .45rem;
        background: var(--bg, #fff); border-bottom: 1px solid var(--border, #e4e4e4);
        font-weight: 700; letter-spacing: .03em; font-size: .76rem; text-transform: uppercase;
        color: var(--text-muted, #777);
      }
      .lp-close {
        border: 0; background: none; cursor: pointer; font-size: 1.25rem; line-height: 1;
        color: var(--text-muted, #999); padding: 0 .1rem;
      }
      .lp-close:hover { color: var(--text, #333); }
      .lp-group { padding: .4rem .7rem .15rem; }
      .lp-group + .lp-group { border-top: 1px solid var(--border-subtle, #f0f0f0); }
      .lp-grouphead { display: flex; align-items: baseline; gap: .4rem; user-select: none; }
      .lp-gtitle {
        font-size: .68rem; text-transform: uppercase; letter-spacing: .05em;
        font-weight: 700; color: var(--accent, #6680cc);
      }
      .lp-gsrc { font-size: .66rem; color: var(--text-muted, #aaa); font-style: italic; margin-left: auto; }
      .lp-group.collapsible .lp-grouphead { cursor: pointer; }
      .lp-group.collapsible .lp-grouphead::before {
        content: "▸"; font-size: .6rem; color: var(--text-muted, #aaa); transition: transform .12s;
      }
      .lp-group.collapsible.open .lp-grouphead::before { transform: rotate(90deg); }
      .lp-group.collapsible:not(.open) .lp-items { display: none; }
      .lp-items { margin: .3rem 0 .15rem; }
      .lp-items.lp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 .4rem; }
      .lp-item {
        display: flex; align-items: center; gap: .4rem; padding: .14rem .3rem;
        border-radius: 5px; cursor: pointer;
      }
      .lp-item:hover { background: var(--bg-subtle, #f2f5fb); }
      .lp-item input {
        width: auto; height: auto; margin: 0; padding: 0; min-width: 0;
        flex: 0 0 auto; accent-color: var(--accent, #6680cc);
      }
      .lp-label { flex: 1 1 auto; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      /* dynasty tree */
      .lp-dynhead {
        display: flex; align-items: baseline; gap: .35rem; cursor: pointer;
        padding: .16rem .15rem; border-radius: 5px;
      }
      .lp-dynhead:hover { background: var(--bg-subtle, #f2f5fb); }
      .lp-dynhead::before {
        content: "▸"; font-size: .58rem; color: var(--text-muted, #aaa); transition: transform .12s; flex: 0 0 auto;
      }
      .lp-dyn.open .lp-dynhead::before { transform: rotate(90deg); }
      .lp-dyn-zh { font-weight: 600; }
      .lp-dyn-en { font-size: .72em; color: var(--text-muted, #999); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .lp-dyn-n {
        margin-left: auto; flex: 0 0 auto; font-size: .68rem; color: var(--text-muted, #888);
        background: var(--bg-subtle, #eef); border-radius: 8px; padding: 0 .35rem;
      }
      .lp-dynitems { display: none; margin-left: .85rem; padding-left: .3rem; border-left: 1px solid var(--border-subtle, #eee); }
      .lp-dyn.open .lp-dynitems { display: block; }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="brand"><a href="index.html" class="brand-home">Epiwen</a></div>
      <nav class="sitenav">
        <a href="map.html"                      class="sitenav-link active">Map</a>
        <a href="sites.html"                    class="sitenav-link">Sites</a>
        <a href="catalog.html"                  class="sitenav-link">Objects</a>
        <a href="catalog.html?tab=inscriptions"  class="sitenav-link">Inscriptions</a>
        <a href="catalog.html?tab=rubbings"     class="sitenav-link">Rubbings</a>
        <a href="favorites.html"               class="sitenav-link">Favorites</a>
        <a href="authorities.html"              class="sitenav-link">Authorities</a>
        <a href="bibliography.html"             class="sitenav-link">Bibliography</a>
        <a href="docs.html"                     class="sitenav-link">Docs</a>
        <a href="issues.html"                   class="sitenav-link">Issues</a>
      </nav>
      <button onclick="EpiAuth.signOut()" class="btn small">Sign out</button>
    </header>

    <div style="position:relative">
      <div id="map"></div>
      <div class="map-legend"><span id="map-count"></span> sites · click a marker to open it</div>
    </div>

    <div id="toast" role="status" aria-live="polite"></div>
    <script src="leaflet/leaflet.js"></script>
    <script src="leaflet/leaflet.markercluster.js"></script>
    <script src="map.js?v=3"></script>
  </body>
</html>
