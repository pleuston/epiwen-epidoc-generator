<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Epiwen · Catalog</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="auth.js"></script>
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <a href="index.html" class="brand-home">Epiwen</a>
      </div>
      <nav class="sitenav">
        <a href="map.html"                     class="sitenav-link">Map</a>
        <a href="sites.html"                   class="sitenav-link">Sites</a>
        <a href="catalog.html"                 class="sitenav-link" data-tab="objects">Objects</a>
        <a href="catalog.html?tab=inscriptions" class="sitenav-link" data-tab="inscriptions">Inscriptions</a>
        <a href="catalog.html?tab=rubbings"    class="sitenav-link" data-tab="rubbings">Rubbings</a>
        <a href="authorities.html"             class="sitenav-link">Authorities</a>
        <a href="bibliography.html"            class="sitenav-link">Bibliography</a>
        <a href="docs.html"                    class="sitenav-link">Docs</a>
      </nav>
      <button onclick="EpiAuth.signOut()" class="btn small">Sign out</button>
    </header>

    <div class="about-layout">

      <div class="about-pane">
        <section class="catalog-section" style="margin-top:0">
          <div class="catalog-head">
            <h2>Catalog</h2>
            <div class="catalog-head-actions">
              <a href="editor.html" id="btn-add-new" class="btn small primary">+ New</a>
              <input type="search" id="catalog-search" class="catalog-searchbox"
                     placeholder="Filter…" aria-label="filter catalog" />
            </div>
          </div>
          <div id="catalog-list">
            <div class="catalog-loading">Loading records from GitHub…</div>
          </div>
        </section>
      </div>

      <div class="catalog-preview" id="cat-preview-panel">
        <div class="preview-head">
          <span id="preview-title">Select a record to preview</span>
          <div class="preview-head-right">
            <div class="view-toggle" id="cat-view-toggle" style="display:none">
              <button class="view-btn cat-view-btn active" data-view="html">Preview</button>
              <button class="view-btn cat-view-btn"        data-view="xml">XML</button>
            </div>
            <button id="preview-copy" class="btn small" style="display:none">Copy XML</button>
          </div>
        </div>
        <div id="cat-html-view" class="hp-pane" style="display:none"></div>
        <pre id="cat-xml-view" style="display:none"><code id="preview-out" class="catalog-xml"></code></pre>
      </div>

    </div>

    <footer class="foot">
      Source:
      <a href="https://github.com/pleuston/epiwen-epidoc-generator"
         target="_blank" rel="noopener">github.com/pleuston/epiwen-epidoc-generator</a>
    </footer>

    <div id="toast" role="status" aria-live="polite"></div>
    <script src="catalog.js"></script>
    <script src="modal.js"></script>
  </body>
</html>
