<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Epiwen · Favorites</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="auth.js"></script>
    <script src="favorites.js"></script>
  </head>
  <body>
    <header class="topbar">
      <div class="brand"><a href="index.html" class="brand-home">Epiwen</a></div>
      <nav class="sitenav">
        <a href="map.html"                      class="sitenav-link">Map</a>
        <a href="sites.html"                    class="sitenav-link">Sites</a>
        <a href="catalog.html"                  class="sitenav-link">Objects</a>
        <a href="catalog.html?tab=inscriptions" class="sitenav-link">Inscriptions</a>
        <a href="catalog.html?tab=rubbings"     class="sitenav-link">Rubbings</a>
        <a href="favorites.html"                class="sitenav-link active">Favorites</a>
        <a href="authorities.html"              class="sitenav-link">Authorities</a>
        <a href="bibliography.html"             class="sitenav-link">Bibliography</a>
        <a href="docs.html"                     class="sitenav-link">Docs</a>
      </nav>
      <button onclick="EpiAuth.signOut()" class="btn small">Sign out</button>
    </header>

    <div class="about-layout">
      <div class="about-pane">
        <section class="catalog-section" style="margin-top:0">
          <div class="catalog-head">
            <h2>Favorite comparisons</h2>
          </div>
          <p style="font-size:.85rem;color:var(--muted);max-width:60ch">
            Saved rubbing comparisons. Build one on the Rubbings tab by adding rubbings to the
            comparison bar, then “★ Save to favorites”. Saved per browser (localStorage).
          </p>
          <div id="fav-list"><div class="catalog-loading">Loading…</div></div>
        </section>
      </div>
    </div>

    <script>
      (function () {
        function esc(s) {
          return String(s == null ? "" : s)
            .replace(/&/g, "&amp;").replace(/</g, "&lt;")
            .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
        }
        function fmt(iso) { try { return new Date(iso).toLocaleDateString(); } catch (e) { return ""; } }

        function render() {
          var list = document.getElementById("fav-list");
          var favs = EpiFavorites.list();
          if (!favs.length) {
            list.innerHTML = '<div class="catalog-empty">No saved comparisons yet. ' +
              'Add rubbings to the comparison bar on the ' +
              '<a href="catalog.html?tab=rubbings">Rubbings tab</a>, then “★ Save to favorites”.</div>';
            return;
          }
          list.innerHTML = "";
          favs.forEach(function (f) {
            var item = document.createElement("div");
            item.className = "catalog-item";
            var titles = (f.titles && f.titles.length) ? f.titles : f.manifests;
            item.innerHTML =
              '<div class="catalog-monument">' +
                '<div class="catalog-info">' +
                  '<div class="catalog-title"><span class="catalog-title-en">' + esc(f.name) + '</span></div>' +
                  '<span class="catalog-date">' + f.manifests.length + ' rubbing' +
                    (f.manifests.length > 1 ? "s" : "") + ' · saved ' + esc(fmt(f.created)) + '</span>' +
                '</div>' +
                '<div class="catalog-actions">' +
                  '<a class="btn small primary" target="_blank" rel="noopener" href="' +
                    esc(EpiFavorites.viewerHref(f.manifests)) + '">Open ↗</a>' +
                  '<button class="btn small" data-detach="' + esc(f.id) + '" type="button">⧉ Detach</button>' +
                  '<button class="btn small" data-del="' + esc(f.id) + '" type="button">Delete</button>' +
                '</div>' +
              '</div>' +
              '<ul class="catalog-rubbings">' + titles.map(function (t) {
                return '<li class="catalog-rubbing"><span class="rub-title">' + esc(t) + '</span></li>';
              }).join("") + '</ul>';
            item.querySelector("[data-detach]").addEventListener("click", function () {
              EpiFavorites.detach(f.manifests);
            });
            item.querySelector("[data-del]").addEventListener("click", function () {
              if (confirm("Delete “" + f.name + "”?")) { EpiFavorites.remove(f.id); render(); }
            });
            list.appendChild(item);
          });
        }
        render();
      })();
    </script>
  </body>
</html>
