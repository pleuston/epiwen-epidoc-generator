<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Epiwen · Authorities</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="auth.js"></script>
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <a href="catalog.html" class="brand-home">Epiwen</a>
      </div>
      <nav class="sitenav">
        <a href="catalog.html"                 class="sitenav-link" data-tab="objects">Objects</a>
        <a href="catalog.html?tab=inscriptions" class="sitenav-link" data-tab="inscriptions">Inscriptions</a>
        <a href="catalog.html?tab=rubbings"    class="sitenav-link" data-tab="rubbings">Rubbings</a>
        <a href="sites.html"                   class="sitenav-link">Sites</a>
        <a href="authorities.html"             class="sitenav-link active">Authorities</a>
        <a href="bibliography.html"            class="sitenav-link">Bibliography</a>
        <a href="docs.html"                    class="sitenav-link">Docs</a>
      </nav>
      <button onclick="EpiAuth.signOut()" class="btn small">Sign out</button>
    </header>

    <div class="about-layout">

      <!-- ── List pane ── -->
      <div class="about-pane">
        <section class="catalog-section" style="margin-top:0">
          <div class="catalog-head">
            <h2>Authorities <span id="auth-count" class="catalog-date" style="font-weight:normal;font-size:.85em"></span></h2>
            <div class="catalog-head-actions">
              <button id="auth-new-btn" class="btn small primary">+ New</button>
              <input type="search" id="auth-search" class="catalog-searchbox"
                     placeholder="Filter…" aria-label="filter authorities" />
            </div>
          </div>
          <div class="view-toggle" style="margin-bottom:.5rem">
            <button class="view-btn auth-tab-btn active" data-filter="all">All</button>
            <button class="view-btn auth-tab-btn" data-filter="personal">Persons</button>
            <button class="view-btn auth-tab-btn" data-filter="corporate">Collections</button>
          </div>
          <div id="auth-list" class="catalog-list"></div>
        </section>
      </div>

      <!-- ── Detail pane ── -->
      <div class="catalog-preview" id="auth-detail-panel">
        <div class="preview-head">
          <span id="preview-title">Select an authority record</span>
        </div>
        <div id="auth-detail-content" class="hp-pane"></div>
      </div>

    </div>

    <footer class="foot">
      Source:
      <a href="https://github.com/pleuston/epiwen-epidoc-generator"
         target="_blank" rel="noopener">github.com/pleuston/epiwen-epidoc-generator</a>
    </footer>

    <div id="toast" role="status" aria-live="polite"></div>
    <script src="authority-browser.js"></script>
    <script src="modal.js"></script>
  </body>
</html>
