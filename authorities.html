<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Epiwen · Authorities</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="auth.js"></script>
    <script src="data.js"></script>
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <a href="index.html" class="brand-home">Epiwen</a>
      </div>
        <nav class="sitenav">
          <div class="nav-group">
            <button class="nav-group-btn">Visuals</button>
            <div class="nav-group-dropdown">
              <a href="map.html" class="sitenav-link">Map</a>
              <a href="graph.html" class="sitenav-link">Graph</a>
            </div>
          </div>
          <span class="nav-pipe">|</span>
          <div class="nav-group">
            <button class="nav-group-btn">Catalogs</button>
            <div class="nav-group-dropdown">
              <a href="sites.html" class="sitenav-link">Sites</a>
              <a href="catalog.html" class="sitenav-link">Objects</a>
              <a href="catalog.html?tab=inscriptions" class="sitenav-link">Inscriptions</a>
              <a href="catalog.html?tab=rubbings" class="sitenav-link">Rubbings</a>
              <a href="glyphs.html" class="sitenav-link">Glyphs</a>
            </div>
          </div>
          <span class="nav-pipe">|</span>
          <div class="nav-group">
            <button class="nav-group-btn">Authorities</button>
            <div class="nav-group-dropdown">
              <a href="authorities.html?filter=vocabulary" class="sitenav-link">Vocabularies</a>
              <a href="authorities.html?filter=personal" class="sitenav-link">Persons</a>
              <a href="authorities.html?filter=corporate" class="sitenav-link">Institutions</a>
              <a href="authorities.html?filter=temporal" class="sitenav-link">Time</a>
              <a href="authorities.html?filter=geographic" class="sitenav-link">Places</a>
            </div>
          </div>
          <span class="nav-pipe">|</span>
          <div class="nav-group">
            <button class="nav-group-btn">References</button>
            <div class="nav-group-dropdown">
              <a href="bibliography.html" class="sitenav-link">Bibliography</a>
              <a href="epigraphic-literature.html" class="sitenav-link">Epigraphic Literature</a>
              <a href="modern-corpora.html" class="sitenav-link">Modern Corpora</a>
            </div>
          </div>
          <span class="nav-pipe">|</span>
          <div class="nav-group">
            <button class="nav-group-btn">Documentation</button>
            <div class="nav-group-dropdown">
              <a href="ontology.html" class="sitenav-link">Ontology</a>
              <a href="project-wiki.html" class="sitenav-link">Project Wiki</a>
              <a href="issues.html" class="sitenav-link">Issues</a>
              <a href="logs.html" class="sitenav-link">Logs</a>
            </div>
          </div>
        </nav>
      <a href="docs.html"                    class="sitenav-link">Docs</a>
      <a href="bookmarks.html" class="topbar-icon" title="Bookmarks">🔖</a>
      <button onclick="EpiAuth.signOut()" class="btn small">Sign out</button>
    </header>

    <div id="collections-bar" class="collections-bar" style="display:none"></div>

    <div class="about-layout">

      <!-- ── List pane ── -->
      <div class="about-pane">
        <section class="catalog-section" style="margin-top:0">
          <div class="catalog-head">
            <h2>Authorities <span id="auth-count" class="catalog-date" style="font-weight:normal;font-size:.85em"></span></h2>
            <div class="catalog-head-actions">
              <button id="auth-new-btn" class="btn small primary">+ New</button>
              <input type="search" id="auth-search" class="catalog-searchbox"
                     placeholder="Filter…" aria-label="filter authorities" />
            </div>
          </div>
          <div class="view-toggle" style="margin-bottom:.5rem">
            <button class="view-btn auth-tab-btn active" data-filter="all">All</button>
            <button class="view-btn auth-tab-btn" data-filter="vocabulary">Vocabularies</button>
            <button class="view-btn auth-tab-btn" data-filter="personal">Persons</button>
            <button class="view-btn auth-tab-btn" data-filter="corporate">Institutions</button>
            <button class="view-btn auth-tab-btn" data-filter="temporal">Time</button>
            <button class="view-btn auth-tab-btn" data-filter="geographic">Places</button>
          </div>
          <div id="auth-list" class="catalog-list"></div>
        </section>
      </div>

      <!-- ── Detail pane ── -->
      <div class="catalog-preview" id="auth-detail-panel">
        <div class="preview-head">
          <span id="preview-title">Select an authority record</span>
        </div>
        <div id="auth-detail-content" class="hp-pane"></div>
      </div>

    </div>

    <footer class="foot">
      Source:
      <a href="https://github.com/pleuston/epiwen"
         target="_blank" rel="noopener">github.com/pleuston/epiwen</a>
    </footer>

    <div id="toast" role="status" aria-live="polite"></div>
    <script>
      (function () {
        var f = new URLSearchParams(location.search).get("filter");
        if (f) {
          document.querySelectorAll('.sitenav a[href*="?filter="]').forEach(function (a) {
            a.classList.toggle("active", a.href.includes("filter=" + f));
          });
        }
      })();
    </script>
    <script src="collections.js"></script>
    <script src="authority-browser.js"></script>
    <script src="modal.js"></script>
    <script src="nav.js"></script>
  </body>
</html>
