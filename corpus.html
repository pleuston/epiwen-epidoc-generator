<!DOCTYPE html>

  <head>
    <meta charset="UTF-8" />

    <title>Epiwen · Modern Corpus</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="auth.js"></script>
    <style>
      .cd-main { max-width: 900px; margin: 0 auto; padding: 1.2rem 1.5rem 4rem; }
      .cd-back { display: inline-block; font-size: .83rem; color: var(--accent); text-decoration: none; margin-bottom: 1rem; }
      .cd-back:hover { text-decoration: underline; }
      .cd-main h1 { font-size: 1.6rem; margin: .1rem 0 .1rem; }
      .cd-sub { color: var(--muted); font-size: .95rem; margin: 0 0 .2rem; }
      .cd-tags { margin: .5rem 0 0; display: flex; flex-wrap: wrap; gap: .4rem; }
      .cd-tag { display: inline-block; padding: .08rem .5rem; border-radius: 3px; font-size: .74rem; background: #eef0f2; color: var(--muted); }
      .cd-tag.web { background: #e3f0e3; color: #2e6b2e; }
      .cd-main h3 { font-size: .9rem; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); margin: 1.6rem 0 .5rem; border-bottom: 1px solid var(--line); padding-bottom: .25rem; }
      .cd-facts { display: grid; grid-template-columns: max-content 1fr; gap: .35rem .9rem; font-size: .92rem; margin: 0; }
      .cd-facts dt { color: var(--muted); }
      .cd-facts dd { margin: 0; }
      .cd-facts code { font-size: .9em; background: var(--field-bg, #f3f3f3); padding: .05em .35em; border-radius: 3px; }
      .cd-hold { display: flex; flex-wrap: wrap; gap: .5rem; }
      .cd-hold a, .cd-hold span { display: inline-block; padding: .12rem .55rem; border-radius: 4px; font-size: .82rem; text-decoration: none; }
      .cd-hold a:hover { text-decoration: underline; }
      .cd-hold .harvard { background: #f3e0e0; color: #8a2f2f; }
      .cd-hold .sbb { background: #e6ecf5; color: #2f4f86; }
      .cd-hold .k10 { background: #eef0f2; color: var(--muted); }
      .cd-hold .vault { background: #e3f0e3; color: #2e6b2e; }
      .cd-hold .web { background: #e3f0e3; color: #2e6b2e; }
      .cd-hold .sbb-block { flex-basis: 100%; display: flex; flex-wrap: wrap; align-items: center; gap: .4rem; padding: 0; background: none; }
      .cd-hold .sbb-sig { background: #f3f5f9; color: #33415c; font-size: .78rem; }
      .cd-hold .sbb-sig code { background: none; padding: 0; font-size: .92em; }
      .cd-hold .sbb-dig { background: #dbe6f5; color: #2f4f86; font-style: italic; }
      .cd-note { font-size: .82rem; color: var(--muted); }
      .cd-note a { color: var(--accent); word-break: break-all; }
      details.cd-toc summary { cursor: pointer; color: var(--muted); font-size: .82rem; margin-bottom: .4rem; }
      details.cd-toc pre { max-height: 28rem; overflow: auto; white-space: pre-wrap; word-break: break-word;
        background: #faf9f6; border: 1px solid var(--line, #e7e3da); border-radius: 6px; padding: .6rem .8rem;
        font-size: .82rem; line-height: 1.45; font-family: "SF Mono", ui-monospace, Menlo, monospace; }
    </style>
  </head>
