<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Epiwen · Bibliography</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="auth.js"></script>
    <script src="data.js"></script>
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <a href="index.html" class="brand-home">Epiwen</a>
      </div>
      <nav class="sitenav">
        <a href="map.html"                     class="sitenav-link">Map</a>
        <a href="sites.html"                   class="sitenav-link">Sites</a>
        <a href="catalog.html"                 class="sitenav-link" data-tab="objects">Objects</a>
        <a href="catalog.html?tab=inscriptions" class="sitenav-link" data-tab="inscriptions">Inscriptions</a>
        <a href="catalog.html?tab=rubbings"    class="sitenav-link" data-tab="rubbings">Rubbings</a>
        <a href="favorites.html"               class="sitenav-link">Favorites</a>
        <a href="authorities.html"             class="sitenav-link">Authorities</a>
        <a href="bibliography.html"            class="sitenav-link active">Bibliography</a>
        <a href="docs.html"                    class="sitenav-link">Docs</a>
        <a href="issues.html"                   class="sitenav-link">Issues</a>
      </nav>
      <button onclick="EpiAuth.signOut()" class="btn small">Sign out</button>
    </header>

    <div id="collections-bar" class="collections-bar" style="display:none"></div>

    <div class="about-layout">

      <!-- ── List pane ── -->
      <div class="about-pane">
        <section class="catalog-section" style="margin-top:0">
          <div class="catalog-head">
            <h2>Bibliography <span id="biblio-count" class="catalog-date" style="font-weight:normal;font-size:.85em"></span></h2>
            <div class="catalog-head-actions">
              <input type="search" id="biblio-search" class="catalog-searchbox"
                     placeholder="Filter…" aria-label="filter bibliography" />
              <a href="biblio-editor.html" class="btn small primary">+ New</a>
            </div>
          </div>
          <div class="view-toggle" style="margin-bottom:.4rem">
            <button class="view-btn biblio-tab-btn active" data-filter="all">All</button>
            <button class="view-btn biblio-tab-btn" data-filter="monograph">Monograph</button>
            <button class="view-btn biblio-tab-btn" data-filter="article">Article</button>
            <button class="view-btn biblio-tab-btn" data-filter="chapter">Chapter</button>
            <button class="view-btn biblio-tab-btn" data-filter="edited">Edited</button>
          </div>
          <div style="display:flex;align-items:center;gap:.4rem;margin-bottom:.6rem;font-size:.82em;color:var(--text-muted)">
            <label for="year-min">Year</label>
            <input type="number" id="year-min" class="catalog-searchbox"
                   style="width:4.5rem;padding:.25rem .4rem"
                   placeholder="from" min="1800" max="2100" />
            <span>–</span>
            <input type="number" id="year-max" class="catalog-searchbox"
                   style="width:4.5rem;padding:.25rem .4rem"
                   placeholder="to" min="1800" max="2100" />
          </div>
          <div id="biblio-list" class="catalog-list"></div>
        </section>
      </div>

      <!-- ── Detail pane ── -->
      <div class="catalog-preview" id="biblio-detail-panel">
        <div class="preview-head">
          <span id="preview-title">Select a bibliography record</span>
        </div>
        <div id="biblio-detail-content" class="hp-pane"></div>
      </div>

    </div>

    <footer class="foot">
      Source:
      <a href="https://github.com/pleuston/epiwen"
         target="_blank" rel="noopener">github.com/pleuston/epiwen</a>
    </footer>

    <div id="toast" role="status" aria-live="polite"></div>
    <script src="collections.js"></script>
    <script src="bibliography-browser.js"></script>
    <script src="modal.js"></script>
  </body>
</html>
