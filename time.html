    <style>
      .time-layout { display: flex; gap: 0; min-height: calc(100vh - 3.2rem); }
      .time-pane   { flex: 0 0 18rem; border-right: 1px solid var(--border); overflow-y: auto; padding: .5rem 0; }
      .time-detail { flex: 1; padding: 1.5rem 2rem; overflow-y: auto; }
      .dyn-group   { margin-bottom: .1rem; }
      .dyn-btn     { display: flex; justify-content: space-between; align-items: baseline;
                     width: 100%; text-align: left; padding: .35rem .75rem;
                     background: var(--surface-alt, #f4f4f4); border: none; cursor: pointer;
                     font-size: .9rem; font-weight: 600; color: var(--text); gap: .5rem; }
      .dyn-btn:hover { background: var(--hover-bg, #e8e8e8); }
      .dyn-btn .dyn-dates { font-weight: 400; font-size: .8rem; color: var(--text-muted); white-space: nowrap; }
      .era-list    { list-style: none; margin: 0; padding: 0; }
      .era-item    { display: flex; align-items: baseline; gap: .5rem;
                     padding: .28rem .75rem .28rem 1.4rem; cursor: pointer; font-size: .88rem; }
      .era-item:hover  { background: var(--hover-bg, #f0f0f0); }
      .era-item.active { background: var(--accent-light, #e6f0ff); font-weight: 600; }
      .era-zh  { font-size: 1rem; }
      .era-py  { color: var(--text-muted); font-style: italic; font-size: .8rem; }
      .era-dates { margin-left: auto; color: var(--text-muted); font-size: .78rem; white-space: nowrap; }
      .time-h2 { margin-top: 0; display: flex; align-items: baseline; gap: .6rem; }
      .time-h2 .zh { font-size: 1.1rem; font-weight: 400; color: var(--text-muted); }
      .time-meta dt { font-weight: 600; min-width: 8rem; display: inline-block; }
      .time-meta dd { display: inline; margin: 0 0 .3rem 0; }
      .time-meta p  { margin: 0 0 .3rem 0; }
      .epidoc-block { background: var(--surface-alt, #f4f4f4); border-radius: 4px;
                      padding: .75rem 1rem; font-family: monospace; font-size: .83rem;
                      white-space: pre-wrap; overflow-x: auto; margin-top: .5rem; }
      .source-note  { font-size: .82rem; color: var(--text-muted); margin-top: 1.5rem;
                      border-top: 1px solid var(--border); padding-top: .75rem; }
    </style>

    <div class="time-layout">

      <!-- ── Dynasty / era list ── -->
      <div class="time-pane" id="time-pane"></div>

      <!-- ── Detail panel ── -->
      <div class="time-detail" id="time-detail">
        <p style="color:var(--text-muted)">Select a dynasty or reign era.</p>
      </div>

    </div>

    <footer class="foot">
      Source:
      <a href="https://github.com/pleuston/epiwen"
         target="_blank" rel="noopener">github.com/pleuston/epiwen</a>
    </footer>

    <div id="toast" role="status" aria-live="polite"></div>

    <script>
    (function () {
      "use strict";

      var DYNASTIES = [
        { zh: "北魏", en: "Northern Wei",  start: 386, end: 534 },
        { zh: "東魏", en: "Eastern Wei",   start: 534, end: 550 },
        { zh: "西魏", en: "Western Wei",   start: 535, end: 556 },
        { zh: "北齊", en: "Northern Qi",   start: 550, end: 577 },
        { zh: "北周", en: "Northern Zhou", start: 557, end: 581 },
        { zh: "隋",   en: "Sui",           start: 581, end: 618 },
        { zh: "唐",   en: "Tang",          start: 618, end: 907 }
      ];

      var ERAS = [
        { dyn: "北魏", era: "太和", py: "Taihe",      start: 477, end: 499 },
        { dyn: "北魏", era: "正始", py: "Zhengshi",   start: 504, end: 508 },
        { dyn: "北魏", era: "永平", py: "Yongping",   start: 508, end: 512 },
        { dyn: "北魏", era: "延昌", py: "Yanchang",   start: 512, end: 515 },
        { dyn: "北魏", era: "正光", py: "Zhengguang", start: 520, end: 525 },
        { dyn: "北魏", era: "孝昌", py: "Xiaochang",  start: 525, end: 527 },
        { dyn: "東魏", era: "天平", py: "Tianping",   start: 534, end: 537 },
        { dyn: "東魏", era: "興和", py: "Xinghe",     start: 539, end: 542 },
        { dyn: "東魏", era: "武定", py: "Wuding",     start: 543, end: 550 },
        { dyn: "西魏", era: "大統", py: "Datong",     start: 535, end: 551 },
        { dyn: "北齊", era: "天保", py: "Tianbao",    start: 550, end: 559 },
        { dyn: "北齊", era: "河清", py: "Heqing",     start: 562, end: 565 },
        { dyn: "北齊", era: "天統", py: "Tiantong",   start: 565, end: 569 },
        { dyn: "北齊", era: "武平", py: "Wuping",     start: 570, end: 576 },
        { dyn: "北齊", era: "隆化", py: "Longhua",    start: 576, end: 577 },
        { dyn: "北周", era: "保定", py: "Baoding",    start: 561, end: 565 },
        { dyn: "北周", era: "天和", py: "Tianhe",     start: 566, end: 572 },
        { dyn: "北周", era: "建德", py: "Jiande",     start: 572, end: 578 },
        { dyn: "北周", era: "大象", py: "Daxiang",    start: 579, end: 580 },
        { dyn: "隋",   era: "開皇", py: "Kaihuang",   start: 581, end: 600 },
        { dyn: "隋",   era: "仁壽", py: "Renshou",    start: 601, end: 604 },
        { dyn: "隋",   era: "大業", py: "Daye",       start: 605, end: 618 },
        { dyn: "唐",   era: "武德", py: "Wude",       start: 618, end: 626 },
        { dyn: "唐",   era: "貞觀", py: "Zhenguan",   start: 627, end: 649 },
        { dyn: "唐",   era: "開元", py: "Kaiyuan",    start: 713, end: 741 },
        { dyn: "唐",   era: "天寶", py: "Tianbao",    start: 742, end: 756 }
      ];

      var pane   = document.getElementById("time-pane");
      var detail = document.getElementById("time-detail");
      var active = null;

      function isoYear(y) {
        return y < 0 ? "-" + String(-y).padStart(4,"0") : String(y).padStart(4,"0");
      }

      function showDynasty(d) {
        clearActive();
        detail.innerHTML =
          '<h2 class="time-h2">' + d.en + ' <span class="zh">' + d.zh + '</span></h2>' +
          '<p class="time-meta">' +
            '<p><dt>Dates</dt> <dd>' + d.start + '–' + d.end + ' CE</dd></p>' +
            '<p><dt>Reign eras</dt> <dd>' + ERAS.filter(function(e){return e.dyn===d.zh;}).length + ' in this dataset</dd></p>' +
          '</p>' +
          '<p style="font-size:.85rem;color:var(--text-muted);margin-top:1rem">' +
            'Dynasty-level dates are used as fallback <code>notBefore</code>/<code>notAfter</code> ' +
            'when no reign era is attested.' +
          '</p>' +
          '<div class="epidoc-block">' +
            '&lt;origDate calendar="#chinese"\n' +
            '          datingMethod="#dynasty"\n' +
            '          notBefore="' + isoYear(d.start) + '"\n' +
            '          notAfter="'  + isoYear(d.end)   + '"&gt;' + d.zh + '&lt;/origDate&gt;' +
          '</div>' +
          '<p class="source-note">Extend via <a href="https://authority.dila.edu.tw/time/" target="_blank" rel="noopener">DILA Time Authority</a>.</p>';
      }

      function showEra(e) {
        clearActive();
        var li = document.querySelector('.era-item[data-key="' + e.dyn + e.era + '"]');
        if (li) { li.classList.add("active"); active = li; }
        detail.innerHTML =
          '<h2 class="time-h2">' + e.era + ' <span class="zh">' + e.dyn + '</span></h2>' +
          '<p style="font-size:.95rem;color:var(--text-muted);margin-top:-.5rem">' + e.py + '</p>' +
          '<p class="time-meta">' +
            '<p><dt>Dynasty</dt> <dd>' + e.dyn + ' (' + dynEn(e.dyn) + ')</dd></p>' +
            '<p><dt>Dates</dt> <dd>' + e.start + '–' + e.end + ' CE</dd></p>' +
          '</p>' +
          '<p style="font-size:.85rem;margin-top:.75rem">EpiDoc <code>&lt;origDate&gt;</code> — example, year 1:</p>' +
          '<div class="epidoc-block">' +
            '&lt;origDate calendar="#chinese"\n' +
            '          datingMethod="#reign-era"\n' +
            '          when="' + isoYear(e.start) + '"\n' +
            '          notBefore="' + isoYear(e.start) + '"\n' +
            '          notAfter="'  + isoYear(e.end)   + '"&gt;' +
            e.dyn + e.era + '元年&lt;/origDate&gt;' +
          '</div>' +
          '<p class="source-note">Extended table available from <a href="https://authority.dila.edu.tw/time/" target="_blank" rel="noopener">DILA Time Authority</a>.</p>';
      }

      function dynEn(zh) {
        var d = DYNASTIES.filter(function(x){return x.zh===zh;})[0];
        return d ? d.en : zh;
      }

      function clearActive() {
        if (active) active.classList.remove("active");
        active = null;
      }

      // Build sidebar
      DYNASTIES.forEach(function (d) {
        var eras = ERAS.filter(function(e){return e.dyn===d.zh;});
        var group = document.createElement("div");
        group.className = "dyn-group";

        var btn = document.createElement("button");
        btn.className = "dyn-btn";
        btn.innerHTML = '<span>' + d.zh + ' <span style="font-weight:400;font-size:.85rem">' + d.en + '</span></span>' +
                        '<span class="dyn-dates">' + d.start + '–' + d.end + '</span>';
        btn.addEventListener("click", function(){ showDynasty(d); });
        group.appendChild(btn);

        if (eras.length) {
          var ul = document.createElement("ul");
          ul.className = "era-list";
          eras.forEach(function(e) {
            var li = document.createElement("li");
            li.className = "era-item";
            li.setAttribute("data-key", e.dyn + e.era);
            li.innerHTML = '<span class="era-zh">' + e.era + '</span>' +
                           '<span class="era-py">' + e.py + '</span>' +
                           '<span class="era-dates">' + e.start + '–' + e.end + '</span>';
            li.addEventListener("click", function(){ showEra(e); });
            ul.appendChild(li);
          });
          group.appendChild(ul);
        }
        pane.appendChild(group);
      });

    })();
    </script>
    <script src="nav.js"></script>
  </body>
